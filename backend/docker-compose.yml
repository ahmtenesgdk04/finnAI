services:
  postgres:
    image: postgres:16-alpine
    container_name: finnai_postgres
    environment:
      POSTGRES_DB: finnai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - finnai_pgdata:/var/lib/postgresql/data
      - ./src/config/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

volumes:
  finnai_pgdata:
