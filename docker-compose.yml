version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: finnai-postgres
    environment:
      POSTGRES_USER: finnai
      POSTGRES_PASSWORD: finnai123
      POSTGRES_DB: finnai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/config/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

volumes:
  postgres_data:
